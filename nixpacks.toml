# nixpacks.toml
# Tells Railway how to build and run this PHP project.
# Place this file in the ROOT of your project folder.

[phases.setup]
nixPkgs = ["php82", "php82Extensions.mysqli", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.json"]

[start]
cmd = "php -S 0.0.0.0:$PORT"
